---
controller_credential_types:
  - name: Juniper Mist API
    description: Credentials for authenticating to the Juniper Mist cloud API
    kind: cloud
    inputs:
      fields:
        - id: mist_token
          type: string
          label: API Token
          secret: true
        - id: mist_base_url
          type: string
          label: Base URL
          default: "https://api.mist.com"
        - id: org_id
          type: string
          label: Organization ID
      required:
        - mist_token
        - org_id
    injectors:
      extra_vars:
        mist_token: "{%raw%}{{ mist_token }}{%endraw%}"
        mist_base_url: "{%raw%}{{ mist_base_url }}{%endraw%}"
        org_id: "{%raw%}{{ org_id }}{%endraw%}"
