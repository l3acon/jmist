---
- name: Test WxTag management with label_info module and mac_to_ap_id filter
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    org_id: "{{ lookup('ansible.builtin.env', 'ORG_ID') }}"
    mist_token: "{{ lookup('ansible.builtin.env', 'MIST_TOKEN') }}"
    mist_base_url: "{{ lookup('ansible.builtin.env', 'MIST_BASE_URL') | default('https://api.mist.com', true) }}"
    ap_mac: "d4:dc:09:2a:7b:4d"
    tag_name: "this-matt-tag"

  tasks:
    - name: Show AP ID from MAC filter
      ansible.builtin.debug:
        msg: "AP MAC {{ ap_mac }} -> ID {{ ap_mac | l3acon.jmist.mac_to_ap_id }}"

    - name: Look up WxTag by name
      l3acon.jmist.label_info:
        api_token: "{{ mist_token }}"
        base_url: "{{ mist_base_url }}"
        org_id: "{{ org_id }}"
        name: "{{ tag_name }}"
      register: tag

    - name: Show label info
      ansible.builtin.debug:
        var: tag.label

    - name: Update WxTag with AP device ID
      l3acon.jmist.mist_org_wxtags:
        api_token: "{{ mist_token }}"
        base_url: "{{ mist_base_url }}"
        org_id: "{{ org_id }}"
        wxtag_id: "{{ tag.label.id }}"
        state: present
        values:
          - "{{ ap_mac | l3acon.jmist.mac_to_ap_id }}"
      register: update_result

    - name: Show update result
      ansible.builtin.debug:
        var: update_result
